version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: credits_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: credits_db
      POSTGRES_USER: credits_user
      POSTGRES_PASSWORD: credits_password
      POSTGRES_ROOT_PASSWORD: rootpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - credits_network

volumes:
  postgres_data:
    driver: local

networks:
  credits_network:
    driver: bridge 