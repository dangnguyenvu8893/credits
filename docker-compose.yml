version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: credits_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: credits_db
      MYSQL_USER: credits_user
      MYSQL_PASSWORD: credits_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - credits_network

volumes:
  mysql_data:
    driver: local

networks:
  credits_network:
    driver: bridge 